name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race ./... -coverprofile=/tmp/chatwoot-cover-ci.out

      - name: Coverage Gate
        env:
          COVERAGE_MIN: "79.0"
          COVERAGE_PROFILE: /tmp/chatwoot-cover-ci.out
        run: ./scripts/check-coverage.sh
